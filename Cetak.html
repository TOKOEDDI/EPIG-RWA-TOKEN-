 <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cetak EPIG Token</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
body{font-family:Arial;text-align:center;padding:20px;background:#f0f0f0}
.box{background:white;padding:25px;border-radius:15px;max-width:400px;margin:auto;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
h2{color:#6f1d6b}
button{background:#6f1d6b;color:white;border:none;padding:15px;border-radius:10px;width:100%;font-size:16px;margin:10px 0;cursor:pointer}
button:disabled{background:#ccc;cursor:not-allowed}
</style>
</head>
<body>
  <div class="box">
    <img src="logo.png" width="110" style="border-radius:50%">
    <h2>🔥 CETAK EPIG TOKEN 🔥</h2>
    <p>Supply: 200.000.000.000 EPIG</p>
    <button onclick="loginPi()">1. LOGIN DENGAN PI WALLET</button>
    <p id="wallet">Wallet: Belum login</p>
    <button id="btnCetak" onclick="cetakToken()" disabled>2. CETAK TOKEN EPIG</button>
    <p id="status"></p>
  </div>

<script>
let wallet = "";
Pi.init({ version: "2.0", sandbox: false });

async function loginPi() {
  try {
    const auth = await Pi.authenticate(['username', 'payments', 'wallet_address'], onIncompletePaymentFound);
    wallet = auth.user.wallet_address;
    document.getElementById("wallet").innerText = 'Wallet: ' + wallet;
    document.getElementById("btnCetak").disabled = false;
    document.getElementById("status").innerText = '✅ Login berhasil';
  } catch (error) {
    document.getElementById("status").innerText = '❌ Gagal login: ' + error;
  }
}

function onIncompletePaymentFound(payment) {
  console.log("Pembayaran belum selesai:", payment);
}

async function cetakToken() {
  try {
    Pi.createPayment({
      amount: 0.01,
      memo: 'CREATE_EPIG:200M',
      metadata: {token: "EPIG"}
    }, {
      onReadyForServerCompletion: (paymentId) => {
        document.getElementById("status").innerText = '🎉 SELAMAT! EPIG BERHASIL DICETAK!';
      },
      onCancel: (paymentId) => { document.getElementById("status").innerText = '❌ Dibatalkan'; },
      onError: (error) => { document.getElementById("status").innerText = '❌ Error: ' + error; }
    });
  } catch (error) {
    document.getElementById("status").innerText = '❌ Error: ' + error;
  }
}
</script>
</body>
</html>
